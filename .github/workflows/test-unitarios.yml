name: Tests Unitarios

on:
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el repositorio
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # 2. Instalar Node.js
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20

      # 3. Tests Lambda enviar_sms_cocina
      - name: Test enviar_sms_cocina
        working-directory: lambdas/enviar_sms_cocina
        run: |
          npm ci --ignore-scripts
          npm test

      # 4. Tests Lambda actualizar_inventario
      - name: Test actualizar_inventario
        working-directory: lambdas/actualizar_inventario
        run: |
          npm ci --ignore-scripts
          npm test

      # 5. Tests Lambda procesar_pedido
      - name: Test procesar_pedido
        working-directory: lambdas/procesar_pedido
        run: |
          npm ci --ignore-scripts
          npm test
