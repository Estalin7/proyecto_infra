name: Terraform Plan

on:
  push:
    branches:
      - hotfix

env:
  TF_VERSION: "1.9.0"
  AWS_REGION: "us-east-2"
  WORKING_DIR: "iac"

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      # ── 1. Checkout del repositorio ──────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Configurar credenciales AWS ───────────────────────
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── 3. Instalar Terraform ─────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ── 4. Terraform Init ─────────────────────────────────────
      - name: Terraform Init
        run: terraform init -input=false

      # ── 5. Terraform Format Check ─────────────────────────────
      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      # ── 6. Terraform Validate ─────────────────────────────────
      - name: Terraform Validate
        run: terraform validate

      # ── 7. Terraform Plan ─────────────────────────────────────
      # -detailed-exitcode: 0=sin cambios, 1=error, 2=hay cambios (plan OK)
      # Se captura en TF_EXIT_CODE para distinguir error real de "hay cambios"
      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan \
            -var="db_username=${{ secrets.DB_USERNAME }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="redis_auth_token=${{ secrets.REDIS_AUTH_TOKEN }}" \
            -var="telefono_cocina=${{ secrets.TELEFONO_COCINA }}" \
            -input=false \
            -no-color \
            -detailed-exitcode \
            -out=tfplan
          TF_EXIT_CODE=$?
          echo "exit_code=$TF_EXIT_CODE" >> $GITHUB_OUTPUT
          # exit 2 = plan OK con cambios, no es un error
          if [ $TF_EXIT_CODE -eq 1 ]; then
            echo "❌ terraform plan falló con errores"
            exit 1
          fi
          echo "✅ terraform plan completado (exit code: $TF_EXIT_CODE)"

      # ── 8. Resumen del plan en el summary de GitHub ───────────
      - name: Plan Summary
        if: always()
        run: |
          if [ "${{ steps.plan.outputs.exit_code }}" == "0" ]; then
            echo "### ✅ Sin cambios de infraestructura" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.plan.outputs.exit_code }}" == "2" ]; then
            echo "### 📋 Plan con cambios pendientes de aplicar" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Plan falló" >> $GITHUB_STEP_SUMMARY
          fi

      # ── 9. Subir el plan como artefacto ──────────────────────
      - name: Upload Plan Artifact
        if: steps.plan.outputs.exit_code == '2'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}/tfplan
          retention-days: 5
