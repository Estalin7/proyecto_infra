name: Terraform Plan

on:
  workflow_dispatch:

env:
  TF_VERSION: "1.9.0"
  AWS_REGION: "us-east-2"
  WORKING_DIR: "iac"
  # Forzar uso de Node 24 para apagar el warning de deprecacion de Node 20
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      # ── 1. Checkout del repositorio ──────────────────────────
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # ── 2. Configurar credenciales AWS ───────────────────────
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── 3. Instalar Terraform (Manual para evitar wrappers) ────
      - name: Install Terraform
        run: |
          curl -fsSL https://releases.hashicorp.com/terraform/${{ env.TF_VERSION }}/terraform_${{ env.TF_VERSION }}_linux_amd64.zip -o terraform.zip
          unzip terraform.zip
          sudo mv terraform /usr/local/bin/
          terraform -version

      # ── 3.5. Bootstrap Backend ───────────────────────────────
      - name: Bootstrap Backend
        run: |
          if ! aws s3api head-bucket --bucket restaurante-carloncho-tfstate --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "Bucket no existe, creando..."
            aws s3api create-bucket \
              --bucket restaurante-carloncho-tfstate \
              --region ${{ env.AWS_REGION }} \
              --create-bucket-configuration LocationConstraint=${{ env.AWS_REGION }}

            aws s3api put-bucket-versioning \
              --bucket restaurante-carloncho-tfstate \
              --versioning-configuration Status=Enabled

            aws s3api put-bucket-encryption \
              --bucket restaurante-carloncho-tfstate \
              --server-side-encryption-configuration '{
                "Rules": [{"ApplyServerSideEncryptionByDefault": {"SSEAlgorithm": "AES256"}}]
              }'

            aws s3api put-public-access-block \
              --bucket restaurante-carloncho-tfstate \
              --public-access-block-configuration \
              BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
          else
            echo "Bucket ya existe, continuando."
          fi

      # ── 4. Terraform Init ─────────────────────────────────────
      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Workspace
        run: |
          terraform workspace select prod || terraform workspace new prod

      # ── 5. Terraform Format Check ─────────────────────────────
      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      # ── 6. Terraform Validate ─────────────────────────────────
      - name: Terraform Validate
        run: terraform validate

      # ── 7. Terraform Plan ─────────────────────────────────────
      - name: Terraform Plan
        env:
          TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_redis_auth_token: ${{ secrets.REDIS_AUTH_TOKEN }}
          TF_VAR_telefono_cocina: ${{ secrets.TELEFONO_COCINA }}
        run: terraform plan -input=false -no-color || true
