name: Terraform Apply
on:
  workflow_dispatch:

env:
  TF_VERSION: "1.9.0"
  AWS_REGION: "us-east-2"
  WORKING_DIR: "iac"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Configurar AWS ────────────────────────────────────
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── 3. Instalar Terraform ────────────────────────────────
      - name: Install Terraform
        run: |
          curl -fsSL https://releases.hashicorp.com/terraform/${{ env.TF_VERSION }}/terraform_${{ env.TF_VERSION }}_linux_amd64.zip -o terraform.zip
          unzip terraform.zip
          sudo mv terraform /usr/local/bin/
          terraform -version

      # ── 3.5. Bootstrap Backend ───────────────────────────────
      - name: Bootstrap Backend
        run: |
          if ! aws s3api head-bucket --bucket restaurante-carloncho-tfstate --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "Bucket no existe, creando..."
            aws s3api create-bucket \
              --bucket restaurante-carloncho-tfstate \
              --region ${{ env.AWS_REGION }} \
              --create-bucket-configuration LocationConstraint=${{ env.AWS_REGION }}

            aws s3api put-bucket-versioning \
              --bucket restaurante-carloncho-tfstate \
              --versioning-configuration Status=Enabled

            aws s3api put-bucket-encryption \
              --bucket restaurante-carloncho-tfstate \
              --server-side-encryption-configuration '{
                "Rules": [{"ApplyServerSideEncryptionByDefault": {"SSEAlgorithm": "AES256"}}]
              }'

            aws s3api put-public-access-block \
              --bucket restaurante-carloncho-tfstate \
              --public-access-block-configuration \
              BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
          else
            echo "Bucket ya existe, continuando."
          fi

      # ── 3.6. Limpiar recursos huerfanos de un apply anterior ──
      - name: Limpiar recursos huerfanos
        run: |
          echo "Borrando log groups..."
          aws logs delete-log-group --log-group-name "/aws/apigateway/restaurante-carloncho-prod" 2>/dev/null || true
          aws logs delete-log-group --log-group-name "/aws/vpc/flow-logs/restaurante-carloncho-prod" 2>/dev/null || true
          aws logs delete-log-group --log-group-name "aws-waf-logs-restaurante-carloncho-prod" 2>/dev/null || true

          echo "Borrando KMS aliases..."
          aws kms delete-alias --alias-name "alias/restaurante-carloncho-s3-prod" 2>/dev/null || true
          aws kms delete-alias --alias-name "alias/restaurante-carloncho-lambda-prod" 2>/dev/null || true

          echo "Borrando recursos RDS..."
          aws rds delete-db-subnet-group --db-subnet-group-name "restaurante-carloncho-aurora-subnet-group-prod" 2>/dev/null || true
          aws rds delete-db-cluster-parameter-group --db-cluster-parameter-group-name "restaurante-carloncho-aurora-logging-prod" 2>/dev/null || true

          echo "Borrando CloudFront OAC..."
          OAC_ID=$(aws cloudfront list-origin-access-controls \
            --query "OriginAccessControlList.Items[?Name=='restaurante-carloncho-oac-prod'].Id" \
            --output text 2>/dev/null || true)
          if [ -n "$OAC_ID" ] && [ "$OAC_ID" != "None" ]; then
            ETAG=$(aws cloudfront get-origin-access-control --id "$OAC_ID" --query "ETag" --output text 2>/dev/null || true)
            if [ -n "$ETAG" ] && [ "$ETAG" != "None" ]; then
              aws cloudfront delete-origin-access-control --id "$OAC_ID" --if-match "$ETAG" 2>/dev/null || true
            fi
          else
            echo "OAC ya no existe, saltando."
          fi

          echo "Borrando CloudFront Response Headers Policy..."
          RHP_ID=$(aws cloudfront list-response-headers-policies \
            --query "ResponseHeadersPolicyList.Items[?ResponseHeadersPolicy.ResponseHeadersPolicyConfig.Name=='restaurante-carloncho-response-headers-prod'].ResponseHeadersPolicy.Id" \
            --output text 2>/dev/null || true)
          if [ -n "$RHP_ID" ] && [ "$RHP_ID" != "None" ]; then
            ETAG=$(aws cloudfront get-response-headers-policy --id "$RHP_ID" --query "ETag" --output text 2>/dev/null || true)
            if [ -n "$ETAG" ] && [ "$ETAG" != "None" ]; then
              aws cloudfront delete-response-headers-policy --id "$RHP_ID" --if-match "$ETAG" 2>/dev/null || true
            fi
          else
            echo "Response Headers Policy ya no existe, saltando."
          fi

          echo "Limpieza completada."

      # ── 4. Terraform Init ────────────────────────────────────
      - name: Terraform Init
        run: terraform init -input=false

      # ── 5. Terraform Apply ───────────────────────────────────
      - name: Terraform Apply
        env:
          TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_redis_auth_token: ${{ secrets.REDIS_AUTH_TOKEN }}
          TF_VAR_telefono_cocina: ${{ secrets.TELEFONO_COCINA }}
        run: terraform apply -auto-approve -input=false