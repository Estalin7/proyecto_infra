name: Terraform Apply
on:
  workflow_dispatch:
    inputs:
      phase:
        description: "Fase del apply"
        required: true
        type: choice
        options:
          - zone-only
          - full-apply
        default: zone-only

env:
  TF_VERSION: "1.9.0"
  AWS_REGION: "us-east-2"
  WORKING_DIR: "iac"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Configurar AWS ────────────────────────────────────
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── 3. Instalar Terraform ────────────────────────────────
      - name: Install Terraform
        run: |
          curl -fsSL https://releases.hashicorp.com/terraform/${{ env.TF_VERSION }}/terraform_${{ env.TF_VERSION }}_linux_amd64.zip -o terraform.zip
          unzip terraform.zip
          sudo mv terraform /usr/local/bin/
          terraform -version

      # ── 3.5. Bootstrap Backend ───────────────────────────────
      - name: Bootstrap Backend
        run: |
          aws s3api head-bucket --bucket restaurante-carloncho-tfstate 2>/dev/null || \
          aws s3api create-bucket --bucket restaurante-carloncho-tfstate --region ${{ env.AWS_REGION }} --create-bucket-configuration LocationConstraint=${{ env.AWS_REGION }}

      # ── 3.6. Limpiar recursos huerfanos de un apply anterior ──
      - name: Limpiar recursos huerfanos
        run: |
          echo "Borrando log groups..."
          aws logs delete-log-group --log-group-name "/aws/apigateway/restaurante-carloncho-prod" || true
          aws logs delete-log-group --log-group-name "/aws/route53/restaurant.com" || true
          aws logs delete-log-group --log-group-name "/aws/vpc/flow-logs/restaurante-carloncho-prod" || true
          aws logs delete-log-group --log-group-name "aws-waf-logs-restaurante-carloncho-prod" || true

          echo "Borrando KMS aliases..."
          aws kms delete-alias --alias-name "alias/restaurante-carloncho-s3-prod" || true
          aws kms delete-alias --alias-name "alias/restaurante-carloncho-lambda-prod" || true

          echo "Borrando recursos RDS..."
          aws rds delete-db-subnet-group --db-subnet-group-name "restaurante-carloncho-aurora-subnet-group-prod" || true
          aws rds delete-db-cluster-parameter-group --db-cluster-parameter-group-name "restaurante-carloncho-aurora-logging-prod" || true

          echo "Borrando CloudFront OAC..."
          OAC_ID=$(aws cloudfront list-origin-access-controls \
            --query "OriginAccessControlList.Items[?Name=='restaurante-carloncho-oac-prod'].Id" \
            --output text)
          if [ -n "$OAC_ID" ]; then
            ETAG=$(aws cloudfront get-origin-access-control --id "$OAC_ID" --query "ETag" --output text)
            aws cloudfront delete-origin-access-control --id "$OAC_ID" --if-match "$ETAG" || true
          fi

          echo "Borrando CloudFront Response Headers Policy..."
          RHP_ID=$(aws cloudfront list-response-headers-policies \
            --query "ResponseHeadersPolicyList.Items[?ResponseHeadersPolicy.ResponseHeadersPolicyConfig.Name=='restaurante-carloncho-response-headers-prod'].ResponseHeadersPolicy.Id" \
            --output text)
          if [ -n "$RHP_ID" ]; then
            ETAG=$(aws cloudfront get-response-headers-policy --id "$RHP_ID" --query "ETag" --output text)
            aws cloudfront delete-response-headers-policy --id "$RHP_ID" --if-match "$ETAG" || true
          fi

          echo "Limpieza completada."

      # ── 4. Terraform Init ────────────────────────────────────
      - name: Terraform Init
        run: terraform init -input=false

      # ── 5a. FASE 1: solo crea la zona Route53 y muestra los NS ──
      - name: Terraform Apply - solo Route53 zone
        if: ${{ inputs.phase == 'zone-only' }}
        run: terraform apply -target=aws_route53_zone.main -auto-approve -input=false

      - name: Mostrar nameservers
        if: ${{ inputs.phase == 'zone-only' }}
        run: |
          echo "=================================================="
          echo "Copia estos 4 nameservers y actualizalos en el"
          echo "registrador de restaurant.com. Luego espera la"
          echo "propagacion y vuelve a correr este workflow con"
          echo "phase = full-apply"
          echo "=================================================="
          terraform output -raw route53_name_servers

      # ── 5b. FASE 2: verifica propagacion DNS antes del apply completo ──
      - name: Verificar propagacion DNS
        if: ${{ inputs.phase == 'full-apply' }}
        run: |
          for i in {1..5}; do
            RESULT=$(dig +short NS restaurant.com @8.8.8.8)
            echo "Intento $i - NS actuales: $RESULT"
            if echo "$RESULT" | grep -q "awsdns"; then
              echo "DNS propagado correctamente. Continuando con el apply."
              exit 0
            fi
            echo "Aun no propaga, esperando 60s..."
            sleep 60
          done
          echo "Los nameservers de restaurant.com aun no apuntan a AWS."
          echo "Verifica el cambio en el registrador y vuelve a correr el workflow mas tarde."
          exit 1

      # ── 5c. FASE 2: Terraform Apply completo ─────────────────
      - name: Terraform Apply
        if: ${{ inputs.phase == 'full-apply' }}
        env:
          TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_redis_auth_token: ${{ secrets.REDIS_AUTH_TOKEN }}
          TF_VAR_telefono_cocina: ${{ secrets.TELEFONO_COCINA }}
        run: terraform apply -auto-approve -input=false