name: Terraform Apply

on:
  workflow_dispatch:

env:
  TF_VERSION: "1.9.0"
  AWS_REGION: "us-east-2"
  WORKING_DIR: "iac"

  ECR_REPOSITORY: restaurante-carloncho-backend
  IMAGE_TAG: latest

jobs:
  terraform-apply:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:

      #--------------------------------------------------------
      # Checkout
      #--------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      #--------------------------------------------------------
      # AWS Credentials
      #--------------------------------------------------------
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      #--------------------------------------------------------
      # Install Terraform
      #--------------------------------------------------------
      - name: Install Terraform
        run: |
          curl -fsSL https://releases.hashicorp.com/terraform/${{ env.TF_VERSION }}/terraform_${{ env.TF_VERSION }}_linux_amd64.zip -o terraform.zip
          unzip terraform.zip
          sudo mv terraform /usr/local/bin/
          terraform -version

      #--------------------------------------------------------
      # Bootstrap Backend
      #--------------------------------------------------------
      - name: Bootstrap Backend
        run: |
          aws s3api head-bucket --bucket restaurante-carloncho-tfstate 2>/dev/null || \
          aws s3api create-bucket \
            --bucket restaurante-carloncho-tfstate \
            --region ${{ env.AWS_REGION }} \
            --create-bucket-configuration LocationConstraint=${{ env.AWS_REGION }}

      #--------------------------------------------------------
      # Terraform Init
      #--------------------------------------------------------
      - name: Terraform Init
        run: terraform init -input=false

      #--------------------------------------------------------
      # Terraform Import (recursos que ya existen en AWS)
      #--------------------------------------------------------
      - name: Terraform Import - VPC Flow Logs CloudWatch Log Group
        env:
          TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_redis_auth_token: ${{ secrets.REDIS_AUTH_TOKEN }}
          TF_VAR_telefono_cocina: ${{ secrets.TELEFONO_COCINA }}
        run: |
          terraform import -input=false \
            aws_cloudwatch_log_group.vpc_flow_logs \
            /aws/vpc/flow-logs/restaurante-carloncho-prod || true

      #--------------------------------------------------------
      # Terraform Apply
      #--------------------------------------------------------
      - name: Terraform Apply
        env:
          TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_redis_auth_token: ${{ secrets.REDIS_AUTH_TOKEN }}
          TF_VAR_telefono_cocina: ${{ secrets.TELEFONO_COCINA }}
        run: terraform apply -auto-approve -input=false

      #--------------------------------------------------------
      # Login a ECR
      #--------------------------------------------------------
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      #--------------------------------------------------------
      # Build Docker Image
      #--------------------------------------------------------
      - name: Build Docker Image
        run: |
          cd ..
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG .

      #--------------------------------------------------------
      # Tag Image
      #--------------------------------------------------------
      - name: Tag Docker Image
        run: |
          docker tag \
          $ECR_REPOSITORY:$IMAGE_TAG \
          ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG

      #--------------------------------------------------------
      # Push Image to ECR
      #--------------------------------------------------------
      - name: Push Docker Image
        run: |
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG

      #--------------------------------------------------------
      # Instalar Ansible
      #--------------------------------------------------------
      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      #--------------------------------------------------------
      # Ejecutar configuración
      #--------------------------------------------------------
      - name: Ejecutar Ansible
        run: |
          cd ../ansible
          ansible-playbook \
            -i inventory/hosts.yml \
            playbooks/configure.yml

      #--------------------------------------------------------
      # Deploy Frontend
      #--------------------------------------------------------
      - name: Desplegar Frontend
        run: |
          cd ../frontend/frontend
          mv login.html index.html || true
          aws s3 sync . s3://restaurante-carloncho-frontend-prod --sse AES256
