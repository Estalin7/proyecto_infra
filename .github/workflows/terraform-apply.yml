name: Terraform Apply

on:
  workflow_dispatch:

env:
  TF_VERSION: "1.9.0"
  AWS_REGION: "us-east-2"
  WORKING_DIR: "iac"

  ECR_REPOSITORY: restaurante-carloncho-backend-prod
  IMAGE_TAG: latest

jobs:
  terraform-apply:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:

      #--------------------------------------------------------
      # Checkout
      #--------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      #--------------------------------------------------------
      # AWS Credentials
      #--------------------------------------------------------
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      #--------------------------------------------------------
      # Install Terraform
      #--------------------------------------------------------
      - name: Install Terraform
        run: |
          curl --proto '=https' --tlsv1.2 -fsSL https://releases.hashicorp.com/terraform/${{ env.TF_VERSION }}/terraform_${{ env.TF_VERSION }}_linux_amd64.zip -o terraform.zip
          unzip terraform.zip
          sudo mv terraform /usr/local/bin/
          terraform -version

      #--------------------------------------------------------
      # Bootstrap Backend
      #--------------------------------------------------------
      - name: Bootstrap Backend
        run: |
          aws s3api head-bucket --bucket restaurante-carloncho-tfstate 2>/dev/null || \
          aws s3api create-bucket \
            --bucket restaurante-carloncho-tfstate \
            --region ${{ env.AWS_REGION }} \
            --create-bucket-configuration LocationConstraint=${{ env.AWS_REGION }}

      #--------------------------------------------------------
      # Terraform Init
      #--------------------------------------------------------
      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Workspace
        run: |
          terraform workspace select prod || terraform workspace new prod

      #--------------------------------------------------------
      # Terraform Apply
      #--------------------------------------------------------
      - name: Terraform Apply
        env:
          TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_redis_auth_token: ${{ secrets.REDIS_AUTH_TOKEN }}
          TF_VAR_telefono_cocina: ${{ secrets.TELEFONO_COCINA }}
        run: terraform apply -auto-approve -input=false

      #--------------------------------------------------------
      # Login a ECR
      #--------------------------------------------------------
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2.0.1

      #--------------------------------------------------------
      # Build Docker Image (Dockerfile local ligero ~20MB)
      #--------------------------------------------------------
      - name: Build Docker Image
        run: |
          cd ../docker
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG .

      #--------------------------------------------------------
      # Tag Image
      #--------------------------------------------------------
      - name: Tag Docker Image
        run: |
          docker tag \
          $ECR_REPOSITORY:$IMAGE_TAG \
          ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG

      #--------------------------------------------------------
      # Push Image to ECR
      #--------------------------------------------------------
      - name: Push Docker Image
        run: |
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG

      #--------------------------------------------------------
      # Deploy a ECS (force new deployment)
      #--------------------------------------------------------
      - name: Deploy a ECS
        run: |
          aws ecs update-service \
            --cluster restaurante-carloncho-cluster-prod \
            --service restaurante-carloncho-crud-service-prod \
            --force-new-deployment \
            --region $AWS_REGION

          echo "⏳ Esperando que el servicio ECS se estabilice (máx. 10 min)..."
          aws ecs wait services-stable \
            --cluster restaurante-carloncho-cluster-prod \
            --services restaurante-carloncho-crud-service-prod \
            --region $AWS_REGION || echo "⚠️ El servicio aún no se estabilizó, pero el deploy fue iniciado. Revisar en consola AWS."

      #--------------------------------------------------------
      # Deploy Frontend
      #--------------------------------------------------------
      - name: Desplegar Frontend
        run: |
          cd ../frontend/frontend
          mv login.html index.html || true
          aws s3 sync . s3://restaurante-carloncho-frontend-prod --sse AES256
