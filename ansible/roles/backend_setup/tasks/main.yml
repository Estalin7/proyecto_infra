---
# Tasks: Backend Setup Role
# Instala Java, Gradle, y prepara el ambiente para la aplicación Spring Boot

- name: Update system packages
  apt:
    update_cache: yes
    upgrade: dist
  when: ansible_os_family == "Debian"

- name: Install Java {{ java_version }}
  apt:
    name: "openjdk-{{ java_version }}-jdk-headless"
    state: present
  when: ansible_os_family == "Debian"

- name: Create application group
  group:
    name: "{{ app_group }}"
    state: present

- name: Create application user
  user:
    name: "{{ app_user }}"
    group: "{{ app_group }}"
    home: "{{ app_home }}"
    shell: /bin/bash
    createhome: yes
    state: present

- name: Create application directory
  file:
    path: "{{ app_home }}"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: '0750'
    state: directory

- name: Install required build tools
  apt:
    name:
      - git
      - curl
      - wget
      - unzip
      - gradle
    state: present
  when: ansible_os_family == "Debian"

- name: Create logs directory
  file:
    path: "{{ app_home }}/logs"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: '0750'
    state: directory

- name: Create systemd service file
  template:
    src: restaurante-crud.service.j2
    dest: "/etc/systemd/system/{{ systemd_service_name }}.service"
    owner: root
    group: root
    mode: '0644'
  notify: restart-application

- name: Enable systemd service
  systemd:
    name: "{{ systemd_service_name }}"
    enabled: yes
    daemon_reload: true

- name: Configure CloudWatch agent (optional)
  debug:
    msg: "CloudWatch agent configuration can be added here for monitoring"

- name: Configure log rotation
  template:
    src: logrotate.j2
    dest: "/etc/logrotate.d/{{ systemd_service_name }}"
    owner: root
    group: root
    mode: '0644'

- name: Print Java version
  shell: java -version 2>&1 | head -1
  register: java_version_info
  changed_when: false

- name: Confirm Java {{ java_version }} is installed
  debug:
    msg: "{{ java_version_info.stdout }}"