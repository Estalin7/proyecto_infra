[defaults]
# Inventario por defecto
inventory = ./inventory/aws_ec2.yml

# Usuario por defecto para conexiones SSH
remote_user = ubuntu

# Desabilitar host key checking (útil con SSM que ya valida)
host_key_checking = False

# Ruta a los roles
roles_path = ./roles

# Timeout para conexiones
timeout = 10

# Número de forks paralelos
forks = 5

# Callback plugins para mejor salida
#callback_whitelist = profile_tasks, timer

# Log file
log_path = ./ansible.log

[ssh_connection]
# Usar pipelining para mejorar performance
pipelining = True

[privilege_escalation]
# Usar sudo para become (se configura en playbooks si es necesario)
become = False
become_method = sudo
become_user = root

[aws_ec2]
# Plugin de inventario de AWS EC2
plugin = aws_ec2