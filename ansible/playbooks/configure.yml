---
- name: Build and Deploy Backend to ECS
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    aws_region: "us-east-2"
    project: "restaurante-carloncho"
    environment: "prod"
    ecr_repository_url: ""     # Se pasa como extra-var o desde Terraform output
    ecs_cluster_name: ""       # Se pasa como extra-var o desde Terraform output
    ecs_service_name: ""       # Se pasa como extra-var o desde Terraform output
    backend_path: "../proyectoagil"
    image_tag: "{{ lookup('pipe', 'git rev-parse --short HEAD') }}"

  pre_tasks:
    - name: Verify AWS CLI is available
      shell: aws sts get-caller-identity
      changed_when: false

    - name: Verify Docker is available
      shell: docker info
      changed_when: false

  roles:
    - ecs_deploy

  post_tasks:
    - name: Verify ECS tasks are running
      shell: >
        aws ecs list-tasks
        --cluster {{ ecs_cluster_name }}
        --service-name {{ ecs_service_name }}
        --desired-status RUNNING
        --region {{ aws_region }}
        --query 'taskArns'
        --output json
      register: running_tasks
      changed_when: false

    - name: Display running tasks
      debug:
        msg: "🐳 Contenedores corriendo: {{ running_tasks.stdout | from_json | length }}"