---
# Playbook: Configure EC2 Backend CRUD
# Instala y configura el stack Java/Spring Boot en las instancias EC2
# Conexión vía AWS Systems Manager (SSM)

- name: Configure Backend CRUD Instances
  hosts: tag_Role_crud
  become: true
  gather_facts: true

  vars:
    # Variables de configuración (sobrescribir desde CLI o inventario)
    java_version: 21
    gradle_version: "8.5"
    spring_boot_port: 8080
    app_user: appuser
    app_group: appgroup
    app_home: /opt/restaurante-app
    systemd_service_name: restaurante-crud

  pre_tasks:
    - name: Check if instance is reachable
      ping:

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

  roles:
    - backend_setup

  post_tasks:
    - name: Verify Java installation
      shell: java -version
      register: java_version_check
      changed_when: false

    - name: Display Java version
      debug:
        msg: "{{ java_version_check.stderr_lines }}"

    - name: Check application health
      uri:
        url: "http://localhost:{{ spring_boot_port }}/actuator/health"
        method: GET
        status_code: 200
      register: health_check
      retries: 5
      delay: 10
      until: health_check.status == 200

    - name: Application is healthy
      debug:
        msg: "✅ Backend CRUD application is running and healthy"

  handlers:
    - name: restart-application
      systemd:
        name: "{{ systemd_service_name }}"
        state: restarted
        daemon_reload: true
